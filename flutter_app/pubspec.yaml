name: trackorder
description: Sales Team Tracking + Ordering App
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.1
  retrofit: ^4.1.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2           # offline support

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Camera & Media
  camera: ^0.11.0
  image_picker: ^1.0.7
  image_cropper: ^5.0.1

  # UI Components
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0          # charts for dashboard
  timeline_tile: ^2.0.0
  intl: ^0.19.0
  badges: ^3.1.2

  # Push Notifications
  firebase_core: ^2.27.1
  firebase_messaging: ^14.8.1

  # Utils
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  workmanager: ^0.5.2        # background location

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
